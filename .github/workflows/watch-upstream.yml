name: Watch Upstream Releases

on:
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # full history + persisted credentials are required to merge the
          # upstream tag and push the sync branch.
          fetch-depth: 0 # zizmor: ignore[artipacked] -- credentials are needed to push the sync branch

      - name: Check upstream version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM: pydantic/genai-prices
        run: |
          set -euo pipefail
          latest=$(gh release view --repo "$UPSTREAM" --json tagName --jq '.tagName')
          latest_ver="${latest#v}"
          current=$(grep -m1 '^version = ' packages/python/pyproject.toml \
            | sed -E 's/^version = "(.*)"/\1/')
          branch="sync-upstream-${latest}"
          echo "upstream=$latest_ver current=$current branch=$branch"

          {
            echo "latest=$latest"
            echo "latest_ver=$latest_ver"
            echo "current=$current"
            echo "branch=$branch"
          } >>"$GITHUB_OUTPUT"

          if [ "$latest_ver" = "$current" ]; then
            echo "Fork is up to date with upstream."
            echo "behind=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          open=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" \
            --state open --json number --jq 'length')
          if [ "$open" != "0" ]; then
            echo "Sync PR already open for $branch."
            echo "behind=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "behind=true" >>"$GITHUB_OUTPUT"

      - name: Merge upstream release tag
        id: merge
        if: steps.check.outputs.behind == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/pydantic/genai-prices.git
          git fetch --no-tags upstream \
            "refs/tags/${{ steps.check.outputs.latest }}:refs/tags/${{ steps.check.outputs.latest }}"
          git checkout -b "${{ steps.check.outputs.branch }}"
          if git merge --no-edit "${{ steps.check.outputs.latest }}"; then
            echo "conflict=false" >>"$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflict=true" >>"$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: steps.check.outputs.behind == 'true' && steps.merge.outputs.conflict == 'false'
        with:
          enable-cache: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.check.outputs.behind == 'true' && steps.merge.outputs.conflict == 'false'
        with:
          node-version: 24.x

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.check.outputs.behind == 'true' && steps.merge.outputs.conflict == 'false'
        with:
          go-version: "1.23"
          cache: false

      - name: Rebuild data, bump versions, commit
        if: steps.check.outputs.behind == 'true' && steps.merge.outputs.conflict == 'false'
        env:
          VER: ${{ steps.check.outputs.latest_ver }}
        run: |
          set -euo pipefail
          uv sync --all-packages
          make build
          uvx --from=toml-cli toml set \
            --toml-path=packages/python/pyproject.toml project.version "$VER"
          npm install
          npm version --workspace=packages/js --no-git-tag-version "$VER"
          npm install # refresh package-lock.json with the new version
          uv sync --all-packages # refresh uv.lock with the new version
          git add -A
          git commit -m "Sync upstream ${{ steps.check.outputs.latest }}"

      - name: Push branch and open PR
        if: steps.check.outputs.behind == 'true' && steps.merge.outputs.conflict == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git push --force-with-lease origin "${{ steps.check.outputs.branch }}"
          gh pr create --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "${{ steps.check.outputs.branch }}" \
            --title "Sync upstream ${{ steps.check.outputs.latest }}" \
            --label "upstream-release" \
            --body "$(cat <<EOF
          Automated sync of upstream [\`pydantic/genai-prices\`](https://github.com/pydantic/genai-prices) **${{ steps.check.outputs.latest }}**.

          - Previous version: \`${{ steps.check.outputs.current }}\`
          - New version: \`${{ steps.check.outputs.latest_ver }}\`
          - Release notes: https://github.com/pydantic/genai-prices/releases/tag/${{ steps.check.outputs.latest }}

          This PR merges the upstream release tag, regenerates \`prices/data.json\` and the
          packaged data (\`make build\`), and bumps the Python + JS package versions.

          Please review the diff and let CI pass before merging.

          _Opened automatically by \`.github/workflows/watch-upstream.yml\`._
          EOF
          )"

      - name: Open issue if merge conflicts
        if: steps.check.outputs.behind == 'true' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Upstream release ${{ steps.check.outputs.latest }} needs manual sync"
          open=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title ${title}" --json number --jq 'length')
          if [ "$open" != "0" ]; then
            echo "Issue already open."
            exit 0
          fi
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "${title}" \
            --label "upstream-release" \
            --body "$(cat <<EOF
          Automatic merge of upstream **${{ steps.check.outputs.latest }}** hit conflicts, so no
          sync PR could be opened. Sync manually following \`RELEASE.md\`:

          \`\`\`
          git fetch upstream --tags
          git checkout -b sync-upstream-${{ steps.check.outputs.latest }}
          git merge ${{ steps.check.outputs.latest }}   # resolve conflicts
          make build
          ./uprev.sh ${{ steps.check.outputs.latest_ver }}
          \`\`\`

          _Filed automatically by \`.github/workflows/watch-upstream.yml\`._
          EOF
          )"
