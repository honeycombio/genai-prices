repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch # prevent direct commits to the `main` branch
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
        exclude: ^prices/.*\.json$
      - id: trailing-whitespace
        exclude: ^prices/.*\.json$

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
      - id: fix-spaces
      - id: fix-ligatures

  - repo: https://github.com/codespell-project/codespell
    # Configuration for codespell is in .codespellrc
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd packages/go && test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)'
        language: system
        files: ^packages/go/.*\.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: bash -c 'cd packages/go && go vet ./...'
        language: system
        files: ^packages/go/.*\.go$
        pass_filenames: false
